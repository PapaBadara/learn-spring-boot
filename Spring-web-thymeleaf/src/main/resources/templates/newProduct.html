<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow p-4">
        <h2 class="text-center mb-4">➕ Add Product</h2>

        <form th:action="@{/product}" th:object="${product}" method="post">

            <div class="mb-3">
                <label class="form-label">Type</label>
                <select th:field="*{productType}" class="form-select">
                    <option value="" disabled selected>Select Type</option>
                    <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                </select>
                <div class="text-danger" th:errors="*{productType}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Brand</label>
                <input type="text" th:field="*{brand}" class="form-control">
                <div class="text-danger" th:errors="*{brand}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Model</label>
                <input type="text" th:field="*{model}" class="form-control">
                <div class="text-danger" th:errors="*{model}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" th:field="*{year}" class="form-control">
                <div class="text-danger" th:errors="*{year}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" th:field="*{price}" class="form-control">
                <div class="text-danger" th:errors="*{price}"></div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary">⬅ Back</a>
                <button type="submit" class="btn btn-success">💾 Save</button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
