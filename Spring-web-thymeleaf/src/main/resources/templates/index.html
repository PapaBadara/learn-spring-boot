<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Store</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background-color: #f4f6f9; }
        .card { border-radius: 15px; transition: 0.3s; }
        .card:hover { transform: scale(1.01); }
        .table th { background-color: #212529; color: white; }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">💻 Tech Store</span>
    <a href="/logout" class="btn btn-outline-light">Logout</a>
</nav>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📦 Products</h2>
        <a href="/product/new" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
    </div>

    <!-- Success message -->
    <div th:if="${param.success}" class="alert alert-success">
        Product saved successfully!
    </div>

    <!-- Table -->
    <div class="card shadow p-3">
        <table class="table table-hover text-center align-middle">
            <thead>
            <tr>
                <th>#</th>
                <th>Type</th>
                <th>Brand</th>
                <th>Model</th>
                <th>Price</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product, status : ${products}">
                <td th:text="${status.count}"></td>

                <td>
                    <span class="badge bg-primary" th:text="${product.productType}"></span>
                </td>

                <td th:text="${product.brand}"></td>
                <td th:text="${product.model}"></td>

                <td>
                    <strong th:text="${product.price + ' €'}"></strong>
                </td>

                <td th:text="${product.year}"></td>

                <td>
                    <a th:href="@{/product/edit/{id}(id=${product.id})}"
                       class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil"></i>
                    </a>

                    <a th:href="@{/product/delete/{id}(id=${product.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this product?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
