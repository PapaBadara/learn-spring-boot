<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .card {
            border-radius: 15px;
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.01);
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">💻 Tech Store</span>
    <a href="/logout" class="btn btn-outline-light">Logout</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 col-md-6 mx-auto">

        <h2 class="text-center mb-4">✏️ Edit Product</h2>

        <form th:action="@{/product/{id}(id=${product.id})}"
              th:object="${product}"
              method="post">

            <!-- Type -->
            <div class="mb-3">
                <label class="form-label">Type</label>
                <select class="form-select" th:field="*{productType}">
                    <option value="" disabled>Select type</option>
                    <option th:each="t : ${types}"
                            th:value="${t}"
                            th:text="${t}">
                    </option>
                </select>
                <div class="text-danger" th:errors="*{productType}"></div>
            </div>

            <!-- Brand -->
            <div class="mb-3">
                <label class="form-label">Brand</label>
                <input type="text" class="form-control" th:field="*{brand}">
                <div class="text-danger" th:errors="*{brand}"></div>
            </div>

            <!-- Model -->
            <div class="mb-3">
                <label class="form-label">Model</label>
                <input type="text" class="form-control" th:field="*{model}">
                <div class="text-danger" th:errors="*{model}"></div>
            </div>

            <!-- Year -->
            <div class="mb-3">
                <label class="form-label">Year</label>
                <input type="number" class="form-control" th:field="*{year}">
                <div class="text-danger" th:errors="*{year}"></div>
            </div>

            <!-- Price -->
            <div class="mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}">
                <div class="text-danger" th:errors="*{price}"></div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-4">
                <a href="/" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-arrow-repeat"></i> Update
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
